name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 18 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - name: Analyze source
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9
        with:
          category: /language:${{ matrix.language }}

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24.18.0
      - name: Audit JavaScript lockfile
        run: |
          corepack pnpm install --frozen-lockfile
          corepack pnpm audit --audit-level high
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            services/api/requirements.lock
            services/worker/requirements.lock
      - name: Audit Python lockfiles
        run: |
          python -m pip install --disable-pip-version-check pip-audit==2.10.0
          python -m pip_audit --progress-spinner off -r services/api/requirements.lock
          python -m pip_audit --progress-spinner off -r services/worker/requirements.lock

  source-and-container-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Scan repository for vulnerabilities, secrets and misconfiguration
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.70.0
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Validate the complete Compose deployment graph
        run: docker compose --file infra/compose.yaml config --quiet
      - name: Build API image
        run: docker build --tag cf-ai-card-api:security --file services/api/Dockerfile .
      - name: Build Worker image
        run: docker build --tag cf-ai-card-worker:security --file services/worker/Dockerfile .
      - name: Build card web image
        run: docker build --tag cf-ai-card-card-web:security --file apps/card-web/Dockerfile .
      - name: Build admin web image
        run: docker build --tag cf-ai-card-admin-web:security --file apps/admin-web/Dockerfile .
      - name: Build gateway image
        run: docker build --tag cf-ai-card-gateway:security --file infra/gateway/Dockerfile .
      - name: Scan API image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.70.0
          image-ref: cf-ai-card-api:security
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan Worker image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.70.0
          image-ref: cf-ai-card-worker:security
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan card web image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.70.0
          image-ref: cf-ai-card-card-web:security
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan admin web image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.70.0
          image-ref: cf-ai-card-admin-web:security
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan gateway image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.70.0
          image-ref: cf-ai-card-gateway:security
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Create image SBOMs
        run: |
          mkdir -p artifacts/security
          trivy image --format cyclonedx --output artifacts/security/api-sbom.cdx.json cf-ai-card-api:security
          trivy image --format cyclonedx --output artifacts/security/worker-sbom.cdx.json cf-ai-card-worker:security
          trivy image --format cyclonedx --output artifacts/security/card-web-sbom.cdx.json cf-ai-card-card-web:security
          trivy image --format cyclonedx --output artifacts/security/admin-web-sbom.cdx.json cf-ai-card-admin-web:security
          trivy image --format cyclonedx --output artifacts/security/gateway-sbom.cdx.json cf-ai-card-gateway:security
      - name: Upload SBOM evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/security/*.cdx.json
          if-no-files-found: warn
          retention-days: 30
