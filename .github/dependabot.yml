version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      frontend-runtime:
        patterns:
          - react
          - react-dom
          - vite
          - "@vitejs/*"
      frontend-test:
        patterns:
          - vitest
          - "@testing-library/*"

  - package-ecosystem: pip
    directory: /services/api
    schedule:
      interval: weekly
      day: monday
      time: "02:15"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /services/worker
    schedule:
      interval: weekly
      day: monday
      time: "02:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /services/api
    schedule:
      interval: weekly
      day: monday
      time: "02:45"
      timezone: Asia/Shanghai

  - package-ecosystem: docker
    directory: /services/worker
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai

  - package-ecosystem: docker
    directory: /apps/card-web
    schedule:
      interval: weekly
      day: monday
      time: "03:05"
      timezone: Asia/Shanghai

  - package-ecosystem: docker
    directory: /apps/admin-web
    schedule:
      interval: weekly
      day: monday
      time: "03:10"
      timezone: Asia/Shanghai

  - package-ecosystem: docker
    directory: /infra/gateway
    schedule:
      interval: weekly
      day: monday
      time: "03:15"
      timezone: Asia/Shanghai

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
