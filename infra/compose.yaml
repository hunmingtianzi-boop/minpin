name: cf-ai-card-local

services:
  postgres:
    image: pgvector/pgvector:0.8.4-pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cf_ai_card}
      POSTGRES_USER: ${POSTGRES_USER:-cf_ai_card}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-change-me-app-local-only}
      WORKER_DB_PASSWORD: ${WORKER_DB_PASSWORD:-change-me-worker-local-only}
    ports:
      - "5432:5432"
    volumes:
      # PostgreSQL 18 images store the cluster in a versioned subdirectory.
      # Mount the parent directory so first boot and future pg_upgrade flows work.
      - postgres_data:/var/lib/postgresql
      - ./postgres/001_extensions.sql:/docker-entrypoint-initdb.d/001_extensions.sql:ro
      - ./postgres/002_application_roles.sh:/docker-entrypoint-initdb.d/002_application_roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.6.4-alpine3.23
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-change-me-local-only}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  embedding:
    build:
      context: ..
      dockerfile: services/embedding/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    restart: unless-stopped
    environment:
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-local-embedding-dev-key}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      EMBEDDING_NATIVE_DIMENSION: ${EMBEDDING_NATIVE_DIMENSION:-1024}
      FASTEMBED_CACHE_PATH: /models
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HUB_ETAG_TIMEOUT: ${HF_HUB_ETAG_TIMEOUT:-30}
      HF_HUB_DOWNLOAD_TIMEOUT: ${HF_HUB_DOWNLOAD_TIMEOUT:-300}
      OMP_NUM_THREADS: "1"
      ONNXRUNTIME_INTRA_OP_NUM_THREADS: "1"
    volumes:
      - embedding_models:/models
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health/ready', timeout=5)",
        ]
      interval: 15s
      timeout: 8s
      retries: 40
      start_period: 10m

  migrate:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    restart: "no"
    environment: &api-environment
      APP_ENV: ${APP_ENV:-local}
      APP_NAME: cf-ai-card
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cf_ai_card}:${POSTGRES_PASSWORD:-change-me-local-only}@postgres:5432/${POSTGRES_DB:-cf_ai_card}
      REDIS_URL: redis://redis:6379/0
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-replace-with-at-least-32-random-bytes}
      CORS_ALLOWED_ORIGINS: '${CORS_ALLOWED_ORIGINS:-["http://127.0.0.1:4173","http://localhost:4173","http://127.0.0.1:4174","http://localhost:4174","http://127.0.0.1:8080","http://localhost:8080","http://127.0.0.1:8081","http://localhost:8081"]}'
      PUBLIC_CARD_BASE_URL: ${PUBLIC_CARD_BASE_URL:-http://127.0.0.1:8080}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-flash}
      LLM_THINKING: ${LLM_THINKING:-disabled}
      LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-high}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
      LLM_ALLOW_GENERAL_ANSWERS: ${LLM_ALLOW_GENERAL_ANSWERS:-false}
      RAG_FAQ_FAST_PATH_ENABLED: ${RAG_FAQ_FAST_PATH_ENABLED:-false}
      RAG_FAQ_SIMILARITY_THRESHOLD: ${RAG_FAQ_SIMILARITY_THRESHOLD:-0.92}
      RAG_FAQ_CACHE_TTL_SECONDS: ${RAG_FAQ_CACHE_TTL_SECONDS:-60}
      RAG_FAQ_MAX_QUESTION_CHARS: ${RAG_FAQ_MAX_QUESTION_CHARS:-180}
      LLM_INPUT_PRICE_CNY_PER_MILLION: ${LLM_INPUT_PRICE_CNY_PER_MILLION:-0}
      LLM_OUTPUT_PRICE_CNY_PER_MILLION: ${LLM_OUTPUT_PRICE_CNY_PER_MILLION:-0}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local-fastembed}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://embedding:8010/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-local-embedding-dev-key}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      MODEL_DAILY_BUDGET_CNY: ${MODEL_DAILY_BUDGET_CNY:-100}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "alembic", "-c", "alembic.ini", "upgrade", "head"]

  seed:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    restart: "no"
    environment:
      <<: *api-environment
      # Initial seed writes tenant/company records before the restricted app
      # principal receives its row-level grants. It runs once after migration.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cf_ai_card}:${POSTGRES_PASSWORD:-change-me-local-only}@postgres:5432/${POSTGRES_DB:-cf_ai_card}
    depends_on:
      migrate:
        condition: service_completed_successfully
    command:
      [
        "python",
        "-m",
        "app.cli.seed_content",
        "/seed-data/template.knowledge.json",
        "/seed-data/tuotu.knowledge.json",
      ]

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    restart: unless-stopped
    environment:
      <<: *api-environment
      DATABASE_URL: postgresql+asyncpg://${APP_DB_USER:-cf_ai_card_app}:${APP_DB_PASSWORD:-change-me-app-local-only}@postgres:5432/${POSTGRES_DB:-cf_ai_card}
    ports:
      - "8000:8000"
    depends_on:
      embedding:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  card-web:
    build:
      context: ..
      dockerfile: apps/card-web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_PUBLIC_BASE: ${CARD_WEB_PUBLIC_BASE:-/}
        VITE_ENABLE_BLANK_ENTERPRISE_TEMPLATE: ${VITE_ENABLE_BLANK_ENTERPRISE_TEMPLATE:-false}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20

  admin-web:
    build:
      context: ..
      dockerfile: apps/admin-web/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_PUBLIC_BASE: ${ADMIN_WEB_PUBLIC_BASE:-/c/admin/}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20

  gateway:
    build:
      context: ..
      dockerfile: infra/gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      api:
        condition: service_healthy
      card-web:
        condition: service_healthy
      admin-web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/gateway-health"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    restart: unless-stopped
    environment:
      <<: *api-environment
      DATABASE_URL: postgresql+asyncpg://${WORKER_DB_USER:-cf_ai_card_worker}:${WORKER_DB_PASSWORD:-change-me-worker-local-only}@postgres:5432/${POSTGRES_DB:-cf_ai_card}
      WORKER_DATABASE_URL: postgresql+asyncpg://${WORKER_DB_USER:-cf_ai_card_worker}:${WORKER_DB_PASSWORD:-change-me-worker-local-only}@postgres:5432/${POSTGRES_DB:-cf_ai_card}
      CELERY_BROKER_URL: redis://redis:6379/1
      WORKER_ID: compose-worker
      WORKER_HEALTH_HOST: 0.0.0.0
      WORKER_HEALTH_PORT: 8020
      EVALUATION_DATASET_DIR: /eval-data
      EVALUATION_SUITE_VERSION: ${EVALUATION_SUITE_VERSION:-v2}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-replace-with-kms-backed-key}
      FIELD_ENCRYPTION_KEY_REF: ${FIELD_ENCRYPTION_KEY_REF:-local-v1}
      REMAP_SIGTERM: SIGQUIT
    ports:
      - "8020:8020"
    depends_on:
      embedding:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/health/ready', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  minio_data:
  embedding_models:
