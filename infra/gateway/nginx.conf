worker_processes auto;
error_log /dev/stderr notice;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" request_id=$request_id';
  access_log /dev/stdout main;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 32m;
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Docker service IPs can change whenever Compose recreates a container.
  # Resolve service names continuously so the gateway does not keep routing to
  # a stale upstream address after an API or frontend deployment.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  upstream api_upstream {
    zone api_upstream 64k;
    server api:8000 resolve;
    keepalive 32;
  }

  upstream card_web_upstream {
    zone card_web_upstream 64k;
    server card-web:8080 resolve;
    keepalive 16;
  }

  upstream admin_web_upstream {
    zone admin_web_upstream 64k;
    server admin-web:8080 resolve;
    keepalive 16;
  }

  server {
    listen 8080;
    server_name _;
    server_tokens off;

    location = /gateway-health {
      access_log off;
      default_type text/plain;
      return 200 "ok\n";
    }

    location = /c {
      return 308 /c/;
    }

    location = /c/api {
      return 308 /c/api/;
    }

    location ^~ /c/api/ {
      rewrite ^/c(/api/.*)$ $1 break;
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_set_header X-Forwarded-Prefix /c;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }

    location = /c/admin {
      return 308 /c/admin/;
    }

    location ^~ /c/admin/ {
      rewrite ^/c/admin/(.*)$ /$1 break;
      proxy_pass http://admin_web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_set_header X-Forwarded-Prefix /c/admin;
      proxy_set_header X-Request-ID $request_id;
    }

    location ^~ /c/ {
      rewrite ^/c/(.*)$ /$1 break;
      proxy_pass http://card_web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_set_header X-Forwarded-Prefix /c;
      proxy_set_header X-Request-ID $request_id;
    }

    # Root paths remain available for local Compose development only. Production
    # exposes this gateway solely through the host Nginx /c location.
    location /api/ {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_buffering off;
      proxy_read_timeout 120s;
    }

    location / {
      proxy_pass http://card_web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }
  }

  server {
    listen 8081;
    server_name _;
    server_tokens off;

    location = /gateway-health {
      access_log off;
      default_type text/plain;
      return 200 "ok\n";
    }

    location /api/ {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_buffering off;
      proxy_read_timeout 120s;
    }

    location / {
      proxy_pass http://admin_web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }
  }
}
