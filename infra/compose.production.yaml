# Single-host production override. Host Nginx terminates TLS and only the
# loopback gateway port is published. Databases and internal services remain on
# the Compose network and persist in named volumes.
x-production-environment: &production-environment
  APP_ENV: production
  API_DOCS_ENABLED: "true"
  ASGI_ROOT_PATH: /c
  JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:?required}
  FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?required}
  FIELD_ENCRYPTION_KEY_REF: ${FIELD_ENCRYPTION_KEY_REF:?required}
  METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:?required}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?required}
  TRUSTED_PROXY_CIDRS: '${TRUSTED_PROXY_CIDRS:-["172.16.0.0/12"]}'
  STAFF_AUTH_COOKIE_SECURE: "true"
  REDIS_URL: redis://:${REDIS_PASSWORD:?required}@redis:6379/0
  OBJECT_STORAGE_ENDPOINT: http://minio:9000
  OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-local}
  OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-cf-ai-card-production}
  OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:?required}
  OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:?required}
  OBJECT_STORAGE_SECURE: "false"
  LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
  LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
  LLM_API_KEY: ${LLM_API_KEY:?required}
  LLM_MODEL: ${LLM_MODEL:?required}
  LLM_THINKING: ${LLM_THINKING:-disabled}
  LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-high}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
  LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-1000}
  LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
  LLM_MAX_CONCURRENCY: ${LLM_MAX_CONCURRENCY:-4}
  LLM_QUEUE_TIMEOUT_SECONDS: ${LLM_QUEUE_TIMEOUT_SECONDS:-3}
  LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
  LLM_INPUT_PRICE_CNY_PER_MILLION: ${LLM_INPUT_PRICE_CNY_PER_MILLION:?required}
  LLM_OUTPUT_PRICE_CNY_PER_MILLION: ${LLM_OUTPUT_PRICE_CNY_PER_MILLION:?required}
  EMBEDDING_PROVIDER: local-fastembed
  EMBEDDING_BASE_URL: http://embedding:8010/v1
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:?required}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
  EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
  EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-30}

services:
  postgres:
    ports: !reset []
    mem_limit: ${POSTGRES_MEMORY_LIMIT:-700m}

  redis:
    ports: !reset []
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD:?required}",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--save",
        "60",
        "1",
      ]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?required}
    mem_limit: ${REDIS_MEMORY_LIMIT:-192m}

  minio:
    ports: !reset []
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:?required}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:?required}
    mem_limit: ${MINIO_MEMORY_LIMIT:-320m}

  embedding:
    build:
      context: ..
      dockerfile: services/embedding/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    restart: unless-stopped
    environment:
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:?required}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      FASTEMBED_CACHE_PATH: /models
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HUB_ETAG_TIMEOUT: ${HF_HUB_ETAG_TIMEOUT:-30}
      HF_HUB_DOWNLOAD_TIMEOUT: ${HF_HUB_DOWNLOAD_TIMEOUT:-300}
      OMP_NUM_THREADS: "1"
      ONNXRUNTIME_INTRA_OP_NUM_THREADS: "1"
    volumes:
      - embedding_models:/models
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health/ready', timeout=5)",
        ]
      interval: 15s
      timeout: 8s
      retries: 40
      start_period: 10m
    mem_limit: ${EMBEDDING_MEMORY_LIMIT:-2300m}

  migrate:
    environment:
      <<: *production-environment
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:?required}
      MIGRATION_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:?required}

  seed:
    environment:
      <<: *production-environment
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:?required}
      ADMIN_BOOTSTRAP_TENANT_SLUG: ${ADMIN_BOOTSTRAP_TENANT_SLUG:-}
      ADMIN_BOOTSTRAP_ACCOUNT: ${ADMIN_BOOTSTRAP_ACCOUNT:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
    depends_on:
      embedding:
        condition: service_healthy

  api:
    ports: !reset []
    environment:
      <<: *production-environment
      DATABASE_URL: postgresql+asyncpg://${APP_DB_USER:?required}:${APP_DB_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:?required}
      ADMIN_BOOTSTRAP_TENANT_SLUG: ${ADMIN_BOOTSTRAP_TENANT_SLUG:-}
      ADMIN_BOOTSTRAP_ACCOUNT: ${ADMIN_BOOTSTRAP_ACCOUNT:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
    depends_on:
      embedding:
        condition: service_healthy
    mem_limit: ${API_MEMORY_LIMIT:-700m}

  worker:
    ports: !reset []
    # Celery/billiard closes every descriptor up to RLIMIT_NOFILE when it
    # forks. Some cloud Docker hosts expose a limit near one billion, which
    # leaves the worker child burning a CPU core for hours during startup.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      <<: *production-environment
      DATABASE_URL: postgresql+asyncpg://${WORKER_DB_USER:?required}:${WORKER_DB_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:?required}
      WORKER_DATABASE_URL: postgresql+asyncpg://${WORKER_DB_USER:?required}:${WORKER_DB_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:?required}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?required}@redis:6379/1
    depends_on:
      embedding:
        condition: service_healthy
    mem_limit: ${WORKER_MEMORY_LIMIT:-700m}

  card-web:
    build:
      args:
        VITE_API_BASE_URL: /c/api/v1
        VITE_PUBLIC_BASE: /c/
    mem_limit: ${CARD_WEB_MEMORY_LIMIT:-128m}

  admin-web:
    build:
      args:
        VITE_API_BASE_URL: /c/api/v1
        VITE_PUBLIC_BASE: /c/admin/
    mem_limit: ${ADMIN_WEB_MEMORY_LIMIT:-128m}

  gateway:
    ports: !override
      - "${GATEWAY_BIND_ADDRESS:-127.0.0.1}:${GATEWAY_CARD_PORT:-18080}:8080"
    mem_limit: ${GATEWAY_MEMORY_LIMIT:-128m}

volumes:
  embedding_models:
